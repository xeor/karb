name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4.3.1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: "true"

      - name: Login to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart for OCI
        run: |
          mkdir -p .charts
          helm package charts/karb --destination .charts

      - name: Push chart to GHCR OCI
        run: |
          CHART_VERSION="$(helm show chart charts/karb | awk '/^version:/ {print $2}')"
          if helm show chart "oci://ghcr.io/${{ github.repository_owner }}/karb-chart" --version "${CHART_VERSION}" >/dev/null 2>&1; then
            echo "OCI chart version ${CHART_VERSION} already exists, skipping push"
            exit 0
          fi
          helm push .charts/karb-chart-*.tgz oci://ghcr.io/${{ github.repository_owner }}
